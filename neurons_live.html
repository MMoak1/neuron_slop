<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spiking Neurons — Live</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #ccc;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  h1 {
    font-size: 14px;
    color: #556;
    margin: 12px 0 6px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  #info {
    font-size: 11px;
    color: #445;
    margin-bottom: 8px;
  }
  canvas {
    border: 1px solid #1a1a2e;
    border-radius: 4px;
  }
  #controls {
    margin-top: 10px;
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 12px;
    color: #667;
  }
  #controls label { display: flex; align-items: center; gap: 6px; }
  input[type="range"] {
    width: 100px;
    accent-color: #5e60ce;
  }
  button {
    background: #1a1a2e;
    color: #aab;
    border: 1px solid #2a2a3e;
    padding: 4px 14px;
    border-radius: 3px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
  }
  button:hover { background: #2a2a4e; }
</style>
</head>
<body>
<h1>Spiking Neural Network — Live</h1>
<div id="info">LIF neurons · synaptic connections · watch them fire</div>
<canvas id="c"></canvas>
<div id="controls">
  <label>Speed <input type="range" id="speed" min="1" max="40" value="8"></label>
  <label>Input A <input type="range" id="driveA" min="0" max="40" value="18"></label>
  <label>Input B <input type="range" id="driveB" min="0" max="40" value="10"></label>
  <button id="resetBtn">Reset</button>
  <span id="stats"></span>
</div>

<script>
// ── Canvas setup ───────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = Math.min(window.innerWidth - 40, 900);
const H = Math.min(window.innerHeight - 120, 620);
canvas.width = W;
canvas.height = H;

// ── LIF parameters ─────────────────────────────────────────
const V_REST = -70, V_TH = -55, V_RESET = -75;
const TAU_M = 15, R_M = 10, T_REF = 3, dt = 0.5;

// ── Neuron ──────────────────────────────────────────────────
class Neuron {
  constructor(name, x, y, color) {
    this.name = name;
    this.x = x; this.y = y;
    this.color = color;
    this.v = V_REST;
    this.refTimer = 0;
    this.spiked = false;
    this.glow = 0;        // visual glow intensity [0,1]
    this.spikeCount = 0;
    this.vHistory = [];   // ring buffer for mini trace
    this.histLen = 200;
  }

  step(I) {
    this.spiked = false;
    if (this.refTimer > 0) {
      this.refTimer -= dt;
      this.v = V_RESET;
    } else {
      const dv = (-(this.v - V_REST) + R_M * I) / TAU_M;
      this.v += dv * dt;
      if (this.v >= V_TH) {
        this.spiked = true;
        this.spikeCount++;
        this.glow = 1.0;
        this.v = V_RESET;
        this.refTimer = T_REF;
      }
    }
    // decay glow
    this.glow *= 0.92;
    // record for mini trace
    this.vHistory.push(this.v);
    if (this.vHistory.length > this.histLen) this.vHistory.shift();
  }
}

// ── Synapse ─────────────────────────────────────────────────
class Synapse {
  constructor(pre, post, weight, delayMs = 1.5) {
    this.pre = pre; this.post = post;
    this.weight = weight;
    this.delay = Math.round(delayMs / dt);
    this.buffer = [];
    this.activity = 0; // visual pulse
  }

  step() {
    if (this.pre.spiked) this.buffer.push(this.delay);
    let current = 0;
    const next = [];
    for (const r of this.buffer) {
      if (r <= 0) { current += this.weight; this.activity = 1; }
      else next.push(r - 1);
    }
    this.buffer = next;
    this.activity *= 0.9;
    return current;
  }
}

// ── Build the network ───────────────────────────────────────
const cx = W / 2, cy = H / 2;

// positions — arrange in layers
const neurons = [
  new Neuron("Input A",  cx - 120, 80,  "#e74c3c"),
  new Neuron("Input B",  cx + 120, 80,  "#e67e22"),
  new Neuron("Inter 1",  cx - 100, cy - 20, "#2ecc71"),
  new Neuron("Inter 2",  cx + 100, cy - 20, "#3498db"),
  new Neuron("Inter 3",  cx,       cy + 40,  "#1abc9c"),
  new Neuron("Output 1", cx - 60,  H - 120, "#9b59b6"),
  new Neuron("Output 2", cx + 60,  H - 120, "#e84393"),
];

const [inA, inB, int1, int2, int3, out1, out2] = neurons;

const synapses = [
  // input → inter
  new Synapse(inA, int1, 1.6, 1.5),
  new Synapse(inA, int3, 0.8, 2.0),
  new Synapse(inB, int2, 1.6, 1.5),
  new Synapse(inB, int3, 0.8, 2.0),
  // inter → output
  new Synapse(int1, out1, 1.3, 2.0),
  new Synapse(int2, out2, 1.3, 2.0),
  new Synapse(int3, out1, 0.7, 1.5),
  new Synapse(int3, out2, 0.7, 1.5),
  // lateral inhibition
  new Synapse(int1, int2, -0.9, 1.0),
  new Synapse(int2, int1, -0.9, 1.0),
  // cross output inhibition
  new Synapse(out1, out2, -0.6, 1.0),
  new Synapse(out2, out1, -0.6, 1.0),
];

// ── Simulation state ────────────────────────────────────────
let simTime = 0;

function simStep() {
  const driveA = parseFloat(document.getElementById('driveA').value) / 10;
  const driveB = parseFloat(document.getElementById('driveB').value) / 10;

  // compute synaptic currents
  const currents = new Map();
  neurons.forEach(n => currents.set(n, 0));
  for (const s of synapses) {
    currents.set(s.post, currents.get(s.post) + s.step());
  }

  // step neurons
  for (const n of neurons) {
    let I = currents.get(n);
    // external drive
    if (n === inA) I += driveA + (Math.random() - 0.5) * 0.4;
    if (n === inB) I += driveB + (Math.random() - 0.5) * 0.4;
    n.step(I);
  }

  simTime += dt;
}

// ── Drawing ─────────────────────────────────────────────────
function drawSynapse(s) {
  const exc = s.weight > 0;
  const alpha = Math.min(0.15 + s.activity * 0.6, 0.8);
  const w = Math.abs(s.weight);

  ctx.beginPath();
  ctx.moveTo(s.pre.x, s.pre.y);
  ctx.lineTo(s.post.x, s.post.y);
  ctx.strokeStyle = exc
    ? `rgba(100, 200, 120, ${alpha})`
    : `rgba(200, 80, 80, ${alpha})`;
  ctx.lineWidth = 0.5 + w * (0.8 + s.activity * 2);
  ctx.stroke();

  // arrow
  const dx = s.post.x - s.pre.x, dy = s.post.y - s.pre.y;
  const len = Math.sqrt(dx*dx + dy*dy);
  const nx = dx/len, ny = dy/len;
  const ax = s.post.x - nx * 28, ay = s.post.y - ny * 28;
  const arrowSize = 5 + s.activity * 4;
  ctx.beginPath();
  ctx.moveTo(ax + ny * arrowSize, ay - nx * arrowSize);
  ctx.lineTo(s.post.x - nx * 22, s.post.y - ny * 22);
  ctx.lineTo(ax - ny * arrowSize, ay + nx * arrowSize);
  ctx.fillStyle = ctx.strokeStyle;
  ctx.fill();
}

function drawNeuron(n) {
  const baseR = 20;
  const r = baseR + n.glow * 14;

  // outer glow
  if (n.glow > 0.05) {
    const grad = ctx.createRadialGradient(n.x, n.y, r * 0.3, n.x, n.y, r * 2.5);
    grad.addColorStop(0, n.color + Math.round(n.glow * 80).toString(16).padStart(2,'0'));
    grad.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(n.x, n.y, r * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // neuron body
  ctx.beginPath();
  ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
  const bodyAlpha = 0.3 + n.glow * 0.7;
  ctx.fillStyle = n.color + Math.round(bodyAlpha * 255).toString(16).padStart(2,'0');
  ctx.strokeStyle = n.color + '88';
  ctx.lineWidth = 1.5;
  ctx.fill();
  ctx.stroke();

  // voltage indicator — inner circle scales with membrane potential
  const vNorm = Math.max(0, (n.v - V_REST) / (V_TH - V_REST));
  const innerR = baseR * 0.6 * vNorm;
  if (innerR > 1) {
    ctx.beginPath();
    ctx.arc(n.x, n.y, innerR, 0, Math.PI * 2);
    ctx.fillStyle = '#fff' + Math.round(vNorm * 120).toString(16).padStart(2,'0');
    ctx.fill();
  }

  // label
  ctx.fillStyle = '#889';
  ctx.font = '10px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(n.name, n.x, n.y + r + 14);

  // mini voltage trace below neuron
  const traceW = 60, traceH = 16;
  const tx = n.x - traceW / 2, ty = n.y + r + 20;
  ctx.beginPath();
  const hist = n.vHistory;
  for (let i = 0; i < hist.length; i++) {
    const vn = (hist[i] - V_RESET) / (V_TH - V_RESET + 10);
    const px = tx + (i / n.histLen) * traceW;
    const py = ty + traceH - vn * traceH;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.strokeStyle = n.color + '55';
  ctx.lineWidth = 0.8;
  ctx.stroke();
}

function draw() {
  // background with slight fade (trails)
  ctx.fillStyle = 'rgba(10, 10, 15, 0.3)';
  ctx.fillRect(0, 0, W, H);

  // synapses
  for (const s of synapses) drawSynapse(s);

  // neurons
  for (const n of neurons) drawNeuron(n);

  // time display
  ctx.fillStyle = '#334';
  ctx.font = '11px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText(`t = ${(simTime).toFixed(0)} ms`, 10, H - 10);

  // stats
  const statsEl = document.getElementById('stats');
  const rates = neurons.map(n => {
    const hz = simTime > 0 ? (n.spikeCount / (simTime / 1000)).toFixed(0) : 0;
    return `${n.name}: ${hz}Hz`;
  });
  statsEl.textContent = rates.join('  ·  ');
}

// ── Main loop ───────────────────────────────────────────────
function loop() {
  const stepsPerFrame = parseInt(document.getElementById('speed').value);
  for (let i = 0; i < stepsPerFrame; i++) simStep();
  draw();
  requestAnimationFrame(loop);
}

// ── Reset ───────────────────────────────────────────────────
document.getElementById('resetBtn').addEventListener('click', () => {
  for (const n of neurons) {
    n.v = V_REST; n.refTimer = 0; n.glow = 0;
    n.spikeCount = 0; n.vHistory = [];
  }
  for (const s of synapses) { s.buffer = []; s.activity = 0; }
  simTime = 0;
  ctx.clearRect(0, 0, W, H);
});

// ── Go ──────────────────────────────────────────────────────
// clear canvas fully first
ctx.fillStyle = '#0a0a0f';
ctx.fillRect(0, 0, W, H);
loop();
</script>
</body>
</html>
